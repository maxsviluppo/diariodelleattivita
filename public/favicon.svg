<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="pink-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" />
      <stop offset="35%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#9d174d" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Square Background -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#pink-gradient)" />
  
  <!-- Subtle premium inner glow -->
  <rect x="44" y="44" width="424" height="424" rx="108" fill="none" stroke="#ffffff" stroke-width="10" stroke-opacity="0.25" />
  
  <!-- Beautiful Center Agenda / Journal Art -->
  <g transform="translate(128, 128) scale(1.6)">
    <!-- Main Agenda White Board -->
    <rect x="25" y="30" width="110" height="110" rx="16" fill="#ffffff" />
    
    <!-- Agenda Gold Spirals/Rings -->
    <rect x="42" y="12" width="10" height="24" rx="5" fill="#fcd34d" />
    <rect x="75" y="12" width="10" height="24" rx="5" fill="#fcd34d" />
    <rect x="108" y="12" width="10" height="24" rx="5" fill="#fcd34d" />
    
    <!-- Lined Journal Details -->
    <rect x="45" y="58" width="70" height="8" rx="4" fill="#ec4899" opacity="0.12" />
    <rect x="45" y="78" width="70" height="8" rx="4" fill="#ec4899" opacity="0.12" />
    <rect x="45" y="98" width="45" height="8" rx="4" fill="#ec4899" opacity="0.12" />
    
    <!-- Beautiful Magenta Heart Sparkle/Sticker on Bottom-Right -->
    <path d="M110,95 C110,95 106,90 100,90 C94,90 90,94 90,100 C90,108 110,122 110,122 C110,122 130,108 130,100 C130,94 126,90 120,90 C114,90 110,95 110,95" fill="#f43f5e" />
  </g>
</svg>
